# Build the static hub + decks and force-push to gh-pages (GitHub Pages).
# One-time: Repo → Settings → Pages → Source = branch gh-pages, folder /.

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'index.html'
      - 'fando/**'
      - 'tbh-ai-adoption/**'
      - 'deploy_to_github.sh'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

concurrency:
  group: pages-deploy-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push site to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash deploy_to_github.sh
